<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class = "container">
        <div class="screen active" id="start-screen"> 
            Quiz Time!
            <p>
                Test Your Knowledge
            </p>
            <button id="start-btn">
                start quiz
            </button>
         </h1>



        </div>


        <div class="screen"   id="quiz-screen">
            <div class = "quiz-header">
            <h2 id="question-text">
                question goes here
                </h2>
                <div class="quiz-info">
                <p>
                    Question <span id="current-question">1</span> of<span> 5</span>
                </p>  
                <p>
                 score <span id="score">0</span>
                </p>
                </div>
                <div id="answers-container" class="answers-containers">
                    <!--answer buttons will be inserted in later using our js code -->
                </div>
                <div class="progress-bar">
                    <div id="progress" class="progress">

                    </div>
                    <div id="result-screen" class ="screen">
                           <h1>
                            Quiz Results
                           </h1>
                           <div class="result-info">
                            <p>you scored <span id="final-score">0</span>out of<span id="max-score">5</span>

                           </div>
                           <div id="result-message">Good Job!</div>
                </div>
                <button id="restart-btn">Restart quiz</button>
            
            </div>

        </div>

    </div>
</body>
</html>
